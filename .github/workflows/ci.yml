name: CI

# Automatic gate (every PR + push to main, plus a nightly sanity run):
# build, vet, gofmt, `go vet -tags=conformance` compile-check, offline unit
# tests with coverage + race detector, and golangci-lint (gated to new
# findings via only-new-issues).
#
# The live conformance suite against the shared PUB400 V7R5 target lives in
# a separate, manual-trigger-only workflow (.github/workflows/
# live-conformance.yml) -- the free-tier box is intermittently unavailable
# (package-subsystem hangs, SQL-904 resource limits under load), so it is
# no longer an automatic gate. Run it on demand once the target is healthy.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly at 06:37 UTC (off the top-of-hour to spread API load).
    - cron: "37 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: offline (build/vet/test) ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (go.mod's declared minimum) + latest stable.
        go: ["1.23.x", "stable"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: go build
        run: go build ./...

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs to be run on:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go vet (conformance build tag compile-check)
        run: go vet -tags=conformance ./...

      - name: go test (offline unit) with coverage
        env:
          # Race detector on the stable leg only -- it roughly triples
          # test time, and the floor leg already proves the build.
          RACE: ${{ matrix.go == 'stable' && '-race' || '' }}
        run: |
          go test ./... $RACE \
            -coverpkg=./... -coverprofile=coverage.out -covermode=atomic

      - name: coverage summary + baseline gate
        if: matrix.go == 'stable'
        run: |
          go tool cover -func=coverage.out | tail -1
          total="$(go tool cover -func=coverage.out | tail -1 | grep -oE '[0-9]+\.[0-9]+')"
          echo "### Offline coverage: ${total}% (coverpkg=./...)" >> "$GITHUB_STEP_SUMMARY"
          # Offline (no live DB) coverage floor -- a regression backstop,
          # not a target. The live conformance job exercises the bulk of
          # the driver/hostserver paths and pushes real coverage much
          # higher. Baseline measured ~56% on 2026-06-01.
          floor="50.0"
          awk -v t="$total" -v f="$floor" 'BEGIN {
            if (t+0 < f+0) {
              printf "::error::offline coverage %.1f%% is below baseline floor %.1f%%\n", t, f
              exit 1
            }
            printf "offline coverage %.1f%% >= floor %.1f%%\n", t, f
          }'

      - name: upload coverage profile
        if: matrix.go == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-offline
          path: coverage.out
          if-no-files-found: warn

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # only-new-issues diffs against the merge base / previous
          # commit, which needs full history.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      # golangci-lint v2 requires golangci-lint-action v7+ (v6 is pinned to
      # the v1 line and rejects a v2 linter version).
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          # Build golangci-lint from source with the runner's Go toolchain
          # rather than downloading the release binary: the v2.1.6 binary
          # is compiled with an older Go and its bundled go/types panics
          # type-checking against a newer `stable` Go. goinstall links the
          # runner's Go, matching local `make lint`.
          install-mode: goinstall
          # Baseline pre-existing findings in untouched files; enforce a
          # clean gate only on what a change introduces. See .golangci.yml.
          only-new-issues: true
